<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hot Takes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h4 id="category">FOOTBALL</h4>

    <h1 id="take">Messi is better than Ronaldo</h1>

    <div class="bar">
      <div id="agreeBar"></div>
    </div>

    <p id="percent">50% Agree</p>

    <button onclick="vote('agree')">AGREE</button>
    <button onclick="vote('disagree')">DISAGREE</button>
  </div>

  <script src="script.js"></script>

</body>
</html>
