<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Takes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="screen" id="screen">

  <div class="overlay">
    <h4 id="category">HOT TAKE</h4>
    <h1 id="take">Loading...</h1>

    <div class="bar">
      <div id="agreeBar"></div>
    </div>

    <p id="percent">50% Agree</p>

    <div class="actions">
      <button onclick="vote('agree')" class="agree">👍</button>
      <button onclick="vote('disagree')" class="disagree">👎</button>
    </div>
  </div>
  

</div>

<script src="script.js"></script>
</body>
</html>
<button onclick="shareTake()" class="share">📤</button>
