<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swipe Engine</title>

<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #fff;
  }

  .viewport {
    position: fixed;
    top: 0;
    left: 0;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }

  .track {
    position: absolute;
    width: 100%;
    will-change: transform;
  }

  .card {
    height: 100vh;
    width: 100vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .content {
    width: 85%;
    max-width: 420px;
    background: #111;
    padding: 24px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(255,255,255,0.08);
  }

  .title {
    font-size: 18px;
    margin-bottom: 10px;
  }

  .tag {
    opacity: 0.6;
    font-size: 12px;
  }
</style>
</head>

<body>

<div class="viewport" id="viewport">
  <div class="track" id="track"></div>
</div>

<script>
// --------------------
// DATA
// --------------------
const data = [
  "AI is replacing entry-level jobs",
  "Attention spans are collapsing",
  "Crypto is still alive",
  "Remote work is irreversible",
  "Most startups fail due to timing",
  "Short-form content is addictive",
  "Phones are replacing TVs",
  "Inflation is changing behavior",
  "Social media is engineered addiction"
];

// --------------------
// BUILD CARDS
// --------------------
const track = document.getElementById("track");

data.forEach(text => {
  const el = document.createElement("div");
  el.className = "card";

  el.innerHTML = `
    <div class="content">
      <div class="title">${text}</div>
      <div class="tag">#hot #feed</div>
    </div>
  `;

  track.appendChild(el);
});

// --------------------
// SWIPE ENGINE STATE
// --------------------
let index = 0;
let startY = 0;
let currentY = 0;
let velocity = 0;
let lastMoveTime = 0;
let lastMoveY = 0;
let isDragging = false;

const cards = document.querySelectorAll(".card");

// --------------------
// HELPERS
// --------------------
function setPosition(y) {
  track.style.transform = `translateY(${y}px)`;
}

function clampIndex(i) {
  return Math.max(0, Math.min(data.length - 1, i));
}

function snapToIndex() {
  index = clampIndex(index);
  animateTo(-index * window.innerHeight);
}

// --------------------
// ANIMATION ENGINE
// --------------------
let animating = false;

function animateTo(targetY) {
  animating = true;

  function step() {
    const current = getTranslateY(track);
    const diff = targetY - current;

    const newY = current + diff * 0.18;

    setPosition(newY);

    if (Math.abs(diff) < 0.5) {
      setPosition(targetY);
      animating = false;
      return;
    }

    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

function getTranslateY(el) {
  const style = window.getComputedStyle(el);
  const matrix = new DOMMatrixReadOnly(style.transform);
  return matrix.m42;
}

// --------------------
// TOUCH HANDLERS
// --------------------
const viewport = document.getElementById("viewport");

viewport.addEventListener("touchstart", (e) => {
  isDragging = true;
  startY = e.touches[0].clientY;
  lastMoveY = startY;
  lastMoveTime = Date.now();
  velocity = 0;
});

viewport.addEventListener("touchmove", (e) => {
  if (!isDragging) return;

  const y = e.touches[0].clientY;
  const delta = y - startY;

  const now = Date.now();
  const dt = now - lastMoveTime;

  velocity = (y - lastMoveY) / (dt || 1);

  lastMoveY = y;
  lastMoveTime = now;

  currentY = -index * window.innerHeight + delta;
  setPosition(currentY);
});

viewport.addEventListener("touchend", () => {
  isDragging = false;

  // --------------------
  // VELOCITY DECISION
  // --------------------
  if (velocity < -0.5) {
    index++;
  } else if (velocity > 0.5) {
    index--;
  } else {
    const offset = currentY + index * window.innerHeight;
    if (offset < -100) index++;
    if (offset > 100) index--;
  }

  snapToIndex();
});

// --------------------
// MOUSE SUPPORT (desktop)
// --------------------
viewport.addEventListener("mousedown", (e) => {
  isDragging = true;
  startY = e.clientY;
  lastMoveY = startY;
  lastMoveTime = Date.now();
});

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const y = e.clientY;
  const delta = y - startY;

  const now = Date.now();
  const dt = now - lastMoveTime;

  velocity = (y - lastMoveY) / (dt || 1);

  lastMoveY = y;
  lastMoveTime = now;

  currentY = -index * window.innerHeight + delta;
  setPosition(currentY);
});

window.addEventListener("mouseup", () => {
  if (!isDragging) return;
  isDragging = false;

  if (velocity < -0.5) index++;
  else if (velocity > 0.5) index--;
  else {
    const offset = currentY + index * window.innerHeight;
    if (offset < -100) index++;
    if (offset > 100) index--;
  }

  snapToIndex();
});
</script>

</body>
</html>
