<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ultimate Feed Engine</title>

<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #fff;
  }

  .viewport {
    position: fixed;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .track {
    position: absolute;
    width: 100%;
    will-change: transform;
  }

  .card {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .content {
    width: 85%;
    max-width: 420px;
    background: #111;
    padding: 24px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(255,255,255,0.08);
  }

  .title {
    font-size: 18px;
    margin-bottom: 10px;
  }

  .tag {
    opacity: 0.6;
    font-size: 12px;
    margin-bottom: 15px;
  }

  button {
    background: #222;
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    margin: 5px;
  }

  button:active {
    transform: scale(0.95);
  }

  .agree:hover { background: #1f6f3f; }
  .disagree:hover { background: #7a1f1f; }
</style>
</head>

<body>

<div class="viewport" id="viewport">
  <div class="track" id="track"></div>
</div>

<script>
// ============================
// INITIAL DATA
// ============================
let rawItems = [
  { id: 1, text: "AI is replacing entry-level jobs", topic: "ai", agree: 0, disagree: 0, engagement: 120, timestamp: Date.now() - 10000 },
  { id: 2, text: "Attention spans are collapsing", topic: "culture", agree: 0, disagree: 0, engagement: 95, timestamp: Date.now() - 20000 },
  { id: 3, text: "Crypto is still alive", topic: "finance", agree: 0, disagree: 0, engagement: 80, timestamp: Date.now() - 30000 },
  { id: 4, text: "Remote work is irreversible", topic: "work", agree: 0, disagree: 0, engagement: 140, timestamp: Date.now() - 40000 },
  { id: 5, text: "Short-form content is addictive", topic: "media", agree: 0, disagree: 0, engagement: 200, timestamp: Date.now() - 50000 }
];

// ============================
// SCORING ALGORITHM
// ============================
function scoreItem(item, seenTopics = {}) {
  const now = Date.now();

  const recency = Math.max(0, 1 - (now - item.timestamp) / 600000);
  const engagement = Math.log(item.engagement + 1) / 5;
  const diversity = seenTopics[item.topic] ? 0.4 : 1;
  const randomness = Math.random() * 0.2;

  return (recency + engagement + randomness) * diversity;
}

// ============================
// GENERATE NEW CONTENT
// ============================
function generateNewItem() {
  const topics = ["ai", "finance", "culture", "work", "media"];

  return {
    id: Math.random(),
    text: "New insight #" + Math.floor(Math.random() * 1000),
    topic: topics[Math.floor(Math.random() * topics.length)],
    agree: 0,
    disagree: 0,
    engagement: Math.floor(Math.random() * 150),
    timestamp: Date.now()
  };
}

// ============================
// BUILD RANKED FEED
// ============================
function buildFeed(items, count = 30) {
  let seenTopics = {};
  let pool = [...items];
  let feed = [];

  for (let i = 0; i < count; i++) {

    const scored = pool.map(item => ({
      item,
      score: scoreItem(item, seenTopics)
    }));

    scored.sort((a, b) => b.score - a.score);

    const chosen = scored[0].item;
    feed.push(chosen);

    seenTopics[chosen.topic] = true;
    pool = pool.filter(i => i.id !== chosen.id);

    if (pool.length < 2) {
      pool.push(generateNewItem());
    }
  }

  return feed;
}

// ============================
// INIT FEED
// ============================
const track = document.getElementById("track");
let data = buildFeed(rawItems, 30);

data.forEach(item => {
  const el = document.createElement("div");
  el.className = "card";

  el.innerHTML = `
    <div class="content">
      <div class="title">${item.text}</div>
      <div class="tag">#${item.topic}</div>

      <div>
        <button class="agree">👍 ${item.agree}</button>
        <button class="disagree">👎 ${item.disagree}</button>
      </div>
    </div>
  `;

  // interactions
  const agreeBtn = el.querySelector(".agree");
  const disagreeBtn = el.querySelector(".disagree");

  agreeBtn.addEventListener("click", e => {
    e.stopPropagation();
    item.agree++;
    agreeBtn.innerHTML = `👍 ${item.agree}`;
    item.engagement += 2;
  });

  disagreeBtn.addEventListener("click", e => {
    e.stopPropagation();
    item.disagree++;
    disagreeBtn.innerHTML = `👎 ${item.disagree}`;
    item.engagement += 1;
  });

  track.appendChild(el);
});

// ============================
// SWIPE ENGINE
// ============================
let index = 0;
let startY = 0;
let currentY = 0;
let velocity = 0;
let lastY = 0;
let lastTime = 0;
let dragging = false;

function setY(y) {
  track.style.transform = `translateY(${y}px)`;
}

function getY() {
  const t = window.getComputedStyle(track).transform;
  if (t === "none") return 0;
  return new DOMMatrixReadOnly(t).m42;
}

function animateTo(target) {
  function step() {
    const current = getY();
    const diff = target - current;

    const next = current + diff * 0.18;
    setY(next);

    if (Math.abs(diff) < 0.5) {
      setY(target);
      return;
    }

    requestAnimationFrame(step);
  }

  requestAnimationFrame(step);
}

function snap() {
  index = Math.max(0, Math.min(data.length - 1, index));
  animateTo(-index * window.innerHeight);
}

// ============================
// TOUCH
// ============================
const vp = document.getElementById("viewport");

vp.addEventListener("touchstart", e => {
  dragging = true;
  startY = e.touches[0].clientY;
  lastY = startY;
  lastTime = Date.now();
});

vp.addEventListener("touchmove", e => {
  if (!dragging) return;

  const y = e.touches[0].clientY;
  const delta = y - startY;

  const now = Date.now();
  const dt = now - lastTime;

  velocity = (y - lastY) / (dt || 1);

  lastY = y;
  lastTime = now;

  currentY = -index * window.innerHeight + delta;
  setY(currentY);
});

vp.addEventListener("touchend", () => {
  dragging = false;

  if (velocity < -0.5) index++;
  else if (velocity > 0.5) index--;
  else {
    const offset = currentY + index * window.innerHeight;
    if (offset < -120) index++;
    if (offset > 120) index--;
  }

  snap();
});

// ============================
// MOUSE
// ============================
vp.addEventListener("mousedown", e => {
  dragging = true;
  startY = e.clientY;
  lastY = startY;
  lastTime = Date.now();
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;

  const y = e.clientY;
  const delta = y - startY;

  const now = Date.now();
  const dt = now - lastTime;

  velocity = (y - lastY) / (dt || 1);

  lastY = y;
  lastTime = now;

  currentY = -index * window.innerHeight + delta;
  setY(currentY);
});

window.addEventListener("mouseup", () => {
  if (!dragging) return;
  dragging = false;

  if (velocity < -0.5) index++;
  else if (velocity > 0.5) index--;
  else {
    const offset = currentY + index * window.innerHeight;
    if (offset < -120) index++;
    if (offset > 120) index--;
  }

  snap();
});
</script>

</body>
</html>
