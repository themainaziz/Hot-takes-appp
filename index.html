<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Opinion App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">
  <div id="stats">Agree: 0 | Disagree: 0 | Streak: 0</div>

  <div id="card" class="card">
    <p id="question"></p>
  </div>

  <div id="result"></div>

  <div class="buttons">
    <button class="disagree" onclick="handleChoice('disagree')">Disagree</button>
    <button class="agree" onclick="handleChoice('agree')">Agree</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
